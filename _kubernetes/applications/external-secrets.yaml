apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.5.0

    # No local values.yaml is used here because this Application installs
    # the Helm chart directly from the external-secrets Helm repository.
    # platform/external-secrets/values.yaml is kept for future use.
    # helm:
    #   valueFiles:
    #     - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true