apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.5.14
      helm:
        valueFiles:
          - $values/_kubernetes/platform/argocd/values.yaml

    - repoURL: https://github.com/MosheAzraf/proxmox-iac-k3s-lab.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd