apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homarr-config
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/MosheAzraf/proxmox-iac-k3s-lab
    targetRevision: main
    path: _kubernetes/platform/homarr/configs

  destination:
    server: https://kubernetes.default.svc
    namespace: homarr

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true