---
- name: Install dependencies
  apt:
    name:
      - gpg
      - wget
      - apt-transport-https
      - lsb-release
    update_cache: true

- name: Add HashiCorp GPG key
  shell: |
    wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

- name: Add HashiCorp apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_facts['distribution_release'] }} main"
    state: present

- name: Install Vault
  apt:
    name: "vault={{ vault_version }}"
    update_cache: true

- name: Create Vault data directory
  file:
    path: /opt/vault/data
    state: directory
    owner: vault
    group: vault
    mode: "0750"

- name: Copy Vault configuration
  template:
    src: vault.hcl.j2
    dest: /etc/vault.d/vault.hcl
    owner: vault
    group: vault
    mode: "0640"
  notify: Restart Vault

- name: Enable and start Vault
  systemd:
    name: vault
    enabled: true
    state: started

# unseal vault locally script, usually not recommended, used only for local lab porpuse.

- name: Store Vault unseal key for lab auto-unseal
  copy:
    content: "{{ vault_unseal_key }}"
    dest: /etc/vault.d/unseal.key
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: vault_unseal_key is defined

- name: Copy Vault unseal script
  template:
    src: vault-unseal.sh.j2
    dest: /usr/local/bin/vault-unseal.sh
    owner: root
    group: root
    mode: "0700"

- name: Copy Vault unseal systemd service
  template:
    src: vault-unseal.service.j2
    dest: /etc/systemd/system/vault-unseal.service
    owner: root
    group: root
    mode: "0644"

- name: Enable Vault unseal service
  systemd:
    name: vault-unseal
    enabled: true
    daemon_reload: true
  when: vault_unseal_key is defined

- name: Run Vault unseal service
  systemd:
    name: vault-unseal
    state: started
  when: vault_unseal_key is defined