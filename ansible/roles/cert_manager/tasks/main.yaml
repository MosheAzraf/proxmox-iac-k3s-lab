---
# Runs locally and requires Helm + kubeconfig configured on the development machine
- name: add cert-manager helm repo
  kubernetes.core.helm_repository:
    name: "{{ cert_manager_repo_name }}"
    repo_url: "{{ cert_manager_repo_url }}"

- name: install cert-manager
  kubernetes.core.helm:
    name: "{{ cert_manager_release_name }}"
    chart_ref: "{{ cert_manager_chart }}"
    release_namespace: "{{ cert_manager_namespace }}"
    create_namespace: true
    chart_version: "{{ cert_manager_chart_version }}"
    wait: true
    state: present
    release_values:
      crds:
        enabled: "{{ cert_manager_crds_enabled }}"